<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Email Verification</title>

    <style>
        .container {
            max-width: 500px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            font-family: Arial;
        }

        .otp {
            font-size: 32px;
            letter-spacing: 6px;
            font-weight: bold;
            color: #2d89ef;
            text-align: center;
            margin: 20px 0;
        }
    </style>
</head>

<body style="background:#f6f6f6;padding:20px;">

<div class="container">

    <h1 style="color:#2d89ef;">Email Verification</h1>


    <p>Please verify your email using the OTP below:</p>

    <div class="otp" th:text="${otp}">123456</div>

    <p>This OTP is valid for <b>15 minutes</b>.</p>

    <p style="color:red;">
        If this wasn’t you, ignore this email.
    </p>

    <br>
    <p>Thanks,<br><b>NeoCare Team</b></p>

</div>

</body>
</html>
