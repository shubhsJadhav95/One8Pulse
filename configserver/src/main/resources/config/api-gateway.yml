spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/users/**

        - id: activity-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/activities/**

        - id: ai-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/recommendations/**

        - id: sos-service
          uri: http://localhost:8089
          predicates:
            - Path=/api/sos/**

server:
  port: 8080

jwt:
  secret:
    key: ${JWT_KEY}
  expiration:
    ms: 86400000

